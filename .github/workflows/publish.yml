name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    # Required for npm Trusted Publishing (OIDC)
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run typecheck

      - run: npm run test:coverage

      - run: npm run build

      # Check if this version is already published
      - name: Check version
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if npm view ruledoc@$PACKAGE_VERSION version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Trusted Publishing: no token needed, npm verifies via GitHub OIDC
      - name: Publish
        if: steps.version.outputs.exists == 'false'
        run: npm publish --provenance --access public

      - name: Skip
        if: steps.version.outputs.exists == 'true'
        run: echo "v${{ steps.version.outputs.version }} already published — skipping"
